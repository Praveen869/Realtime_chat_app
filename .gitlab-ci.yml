# GitLab CI Pipeline for Chat App
# This version is simplified to avoid syntax errors

stages:
  - check
  - build

# Backend Job
backend:
  stage: check
  image: python:3.11-slim
  before_script:
    - pip install --upgrade pip
    - pip install -r backend/requirements.txt
  script:
    - echo "Testing backend..."
    - python -m py_compile backend/main.py
    - echo "Backend syntax is OK"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Frontend Job
frontend:
  stage: build
  image: node:20-slim
  before_script:
    - cd frontend
    - npm ci
  script:
    - echo "Building frontend..."
    - npm run build
    - echo "Frontend build is successful"
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
